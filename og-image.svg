<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d47a1"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00bcd4"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="1102" cy="714" r="57" fill="#1565c0" opacity="0.10"/>
    <circle cx="436" cy="508" r="20" fill="#1565c0" opacity="0.14"/>
    <circle cx="1096" cy="404" r="50" fill="#1565c0" opacity="0.09"/>
    <circle cx="390" cy="196" r="65" fill="#1565c0" opacity="0.10"/>
    <circle cx="111" cy="120" r="59" fill="#1565c0" opacity="0.10"/>
    <circle cx="1094" cy="268" r="84" fill="#1565c0" opacity="0.18"/>
    <rect x="1183" y="610" width="93" height="71" rx="8" fill="#0d47a1" opacity="0.05" transform="rotate(28, 1190, -84)"/>
    <rect x="758" y="57" width="88" height="22" rx="8" fill="#0d47a1" opacity="0.10" transform="rotate(31, 1116, 79)"/>
    <rect x="687" y="207" width="95" height="34" rx="8" fill="#0d47a1" opacity="0.15" transform="rotate(19, 532, 303)"/>
    <rect x="1119" y="130" width="26" height="29" rx="8" fill="#0d47a1" opacity="0.11" transform="rotate(34, 756, 72)"/>
    <rect x="838" y="-51" width="24" height="25" rx="8" fill="#0d47a1" opacity="0.07" transform="rotate(31, 1002, 76)"/>
    <rect x="262" y="142" width="62" height="95" rx="8" fill="#0d47a1" opacity="0.11" transform="rotate(3, 762, 629)"/>
    <rect x="299" y="30" width="55" height="50" rx="8" fill="#0d47a1" opacity="0.06" transform="rotate(30, 851, 391)"/>
    <rect x="417" y="319" width="42" height="90" rx="8" fill="#0d47a1" opacity="0.07" transform="rotate(20, 210, 625)"/>
    <polygon points="109,409 181,553 37,553" fill="#1565c0" opacity="0.06"/>
    <polygon points="105,258 139,326 71,326" fill="#1565c0" opacity="0.04"/>
    <polygon points="203,164 252,262 154,262" fill="#1565c0" opacity="0.08"/>
    <polygon points="-84,-4 -32,100 -136,100" fill="#1565c0" opacity="0.09"/>

  <!-- Wave at bottom -->
  <path d="M0,580 C360,605 840,555 1200,580 L1200,630 L0,630Z" fill="#1565c0" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    강남 셔츠룸
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    마포 — 서버 웜업
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#00bcd4" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#00bcd4" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    마포 강남 셔츠룸 — 서버 웜업
  </text>
</svg>